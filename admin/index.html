<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="../assets/logo.svg" alt="Aravali Store">
        <h3>Admin Panel</h3>
        <p class="admin-info">admin</p>
      </div>
      <ul class="admin-nav">
        <li><a href="index.html" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a></li>
        <li><a href="products.html" data-page="products"><span class="nav-icon">📦</span> Products</a></li>
        <li><a href="catalogs.html" data-page="catalogs"><span class="nav-icon">📂</span> Catalogs</a></li>
        <li><a href="banners.html" data-page="banners"><span class="nav-icon">🖼️</span> Banners</a></li>
        <li><a href="offers.html" data-page="offers"><span class="nav-icon">🏷️</span> Offers</a></li>
        <li><a href="orders.html" data-page="orders"><span class="nav-icon">🛒</span> Orders</a></li>
        <li><a href="returns.html" data-page="returns"><span class="nav-icon">🔄</span> Returns</a></li>
        <li><a href="support.html" data-page="support"><span class="nav-icon">💬</span> Support</a></li>
        <li><a href="users.html" data-page="users"><span class="nav-icon">👥</span> Users</a></li>
        <li><a href="settings.html" data-page="settings"><span class="nav-icon">⚙️</span> Settings</a></li>
        <li style="margin-top:20px;"><a href="../index.html"><span class="nav-icon">🏪</span> View Store</a></li>
        <li><a href="#" onclick="App.logout()" style="color:rgba(255,100,100,0.85);"><span class="nav-icon">🚪</span> Logout</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Dashboard</h1>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" onclick="Admin.toggleSidebar()" style="display:none;" id="sidebarToggle">☰</button>
        </div>
      </div>

      <div class="stat-cards"></div>

      <div class="admin-chart">
        <h3>Monthly Revenue</h3>
        <div class="chart-bars"></div>
        <div style="height:30px;"></div>
      </div>

      <div class="recent-orders">
        <h3>Recent Orders</h3>
        <div class="recent-orders-list"></div>
      </div>

      <div class="dbms-folder-section" style="margin-top:28px;">
        <h3 style="margin-bottom:16px;color:var(--primary-dark);">📂 Database (DBMS)</h3>
        <div class="dbms-tables-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;"></div>
      </div>
    </main>
  </div>

  <button class="admin-sidebar-toggle" onclick="Admin.toggleSidebar()">☰</button>

  <div id="productModal" class="modal-overlay" onclick="if(event.target===this){this.classList.remove('active');document.body.classList.remove('modal-open');}">
    <div class="modal" id="productModalContent"></div>
  </div>

  <script src="../DBMS/data.js"></script>
  <script src="../DBMS/database.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
