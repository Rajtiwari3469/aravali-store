<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <div class="admin-login-page">
    <div class="admin-login-card">
      <img src="../assets/logo.svg" alt="Aravali Store">
      <h2>Admin Dashboard</h2>
      <p class="subtitle" style="color:var(--text-muted);font-size:0.88rem;margin-bottom:24px;">Login to manage your store</p>

      <div id="loginError" style="display:none;background:rgba(230,57,70,0.1);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;"></div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="adminEmail" placeholder="admin@gmail.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="adminPassword" placeholder="Enter password" required>
            <button type="button" class="password-toggle" onclick="App.togglePassword('adminPassword')">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Login as Admin</button>
      </form>
      <p class="auth-link" style="margin-top:16px;">
        <a href="../login.html">← Back to User Login</a>
      </p>
    </div>
  </div>

  <script src="../DBMS/data.js"></script>
  <script src="../DBMS/database.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
