    <path d="M50 35 C40 30, 32 35, 32 35" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M50 45 C60 40, 68 45, 68 45" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/>
