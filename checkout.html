<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-icon-btn"><span>🛒</span><span class="badge cart-count" style="display:none;">0</span></a>
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <a href="cart.html">Cart</a> <span>/</span> <span>Checkout</span></div>
    <h1>Checkout</h1>
  </div>

  <div class="checkout-page">
    <div class="checkout-form">
      <h2>Delivery Details</h2>
      <form id="checkoutForm">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="checkoutName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="checkoutPhone" placeholder="Enter your phone number" required>
        </div>
        <div class="form-group">
          <label>Delivery Address *</label>
          <textarea id="checkoutAddress" placeholder="Enter your full delivery address" required></textarea>
        </div>

        <h2 style="margin-top:24px;">Payment Method</h2>
        <div class="payment-options" id="paymentOptions"></div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:24px;">
          Place Order ✓
        </button>
      </form>
    </div>

    <div class="checkout-order-summary">
      <h3>Order Summary</h3>
      <div class="checkout-items" id="checkoutItems"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none;padding-top:0;max-width:1300px;margin:0 auto;">
      <span>© 2026 Aravali Store. All rights reserved.</span>
    </div>
  </footer>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Checkout.init();
      const settings = DB.getSettings();
      const hasUpi = !!(settings.upiId && settings.upiId.trim());
      const po = document.getElementById('paymentOptions');
      let html = `
        <label class="payment-option selected">
          <input type="radio" name="payment" value="Cash on Delivery" checked>
          <span>💵</span>
          <span>Cash on Delivery</span>
        </label>`;
      if (hasUpi) {
        html += `
          <label class="payment-option">
            <input type="radio" name="payment" value="UPI">
            <span>📱</span>
            <span>UPI Payment (${settings.upiId})</span>
          </label>`;
      } else {
        html += `
          <label class="payment-option" style="opacity:0.45;pointer-events:none;">
            <input type="radio" name="payment" value="" disabled>
            <span>📱</span>
            <span>Online Payment — Not Available</span>
          </label>`;
      }
      po.innerHTML = html;
      document.querySelectorAll('.payment-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
        });
      });
    });
  </script>
</body>
</html>
