<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Categories</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user-section"></div>
    </div>
  </nav>

  <div class="success-page">
    <div>
      <div class="success-icon">🎉</div>
      <h1>Order Placed Successfully!</h1>
      <p>Thank you for shopping with Aravali Store. Your order has been placed and is being processed.</p>
      <p id="orderIdDisplay" style="font-weight:700;color:var(--primary);margin-bottom:24px;"></p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <a href="orders.html" class="btn btn-primary">View My Orders</a>
        <a href="shop.html" class="btn btn-secondary">Continue Browsing</a>
      </div>
    </div>
  </div>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderId = App.getParam('id');
      if (orderId) {
        document.getElementById('orderIdDisplay').textContent = `Order ID: #${orderId.slice(-6).toUpperCase()}`;
      }
    });
  </script>
</body>
</html>
