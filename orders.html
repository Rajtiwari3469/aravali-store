<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="nav-icon-btn"><span>❤️</span><span class="badge wishlist-count" style="display:none;">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><span>🛒</span><span class="badge cart-count" style="display:none;">0</span></a>
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span>My Orders</span></div>
    <h1>My Orders</h1>
  </div>

  <div class="orders-page" id="ordersContainer"></div>

  <div id="orderModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal" id="orderModalContent" style="max-width:540px;"></div>
  </div>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none;padding-top:0;max-width:1300px;margin:0 auto;">
      <span>© 2026 Aravali Store. All rights reserved.</span>
    </div>
  </footer>

  <style>
    .order-card { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .order-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(45,106,79,0.15); }
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s; }
    .modal-overlay.active { opacity:1;pointer-events:auto; }
    .modal { background:white;border-radius:16px;padding:28px;max-width:540px;width:92%;max-height:85vh;overflow-y:auto;position:relative; }
    .modal-close { position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.06);border:none;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.15s; }
    .modal-close:hover { background:rgba(230,57,70,0.12);color:var(--danger); }
    .detail-row { display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(45,106,79,0.06); }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { font-size:0.82rem;color:var(--text-muted); }
    .detail-value { font-weight:600;color:var(--text); }
    .detail-section { margin-bottom:16px; }
    .detail-section h4 { font-size:0.85rem;color:var(--primary-dark);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px; }
  </style>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!App.requireAuth()) return;

      const container = document.getElementById('ordersContainer');
      const orders = (await DB.query('orders', o => o.userId === App.currentUser.id)).reverse();

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <h3>No orders yet</h3>
            <p>Start shopping to place your first order!</p>
            <a href="shop.html" class="btn btn-primary">Browse Products</a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const itemCount = (order.items || []).reduce((s, i) => s + i.qty, 0);
        return `
          <div class="order-card" onclick="showOrderDetail('${order.id}')">
            <div class="order-header">
              <div>
                <span class="order-id">Order #${order.id.slice(-6).toUpperCase()}</span>
                <span style="color:var(--text-muted);font-size:0.82rem;margin-left:12px;">${App.formatDate(order.orderDate || order.createdAt)}</span>
              </div>
              <span class="order-status ${order.status}">${order.status}</span>
            </div>
            <div>
              ${(order.items || []).map(item => `
                <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.88rem;">
                  <span>${item.name} × ${item.qty}</span>
                  <span style="font-weight:600;">${App.formatCurrency(item.price * item.qty)}</span>
                </div>
              `).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1px solid rgba(45,106,79,0.08);font-weight:700;color:var(--primary-dark);">
              <span>Total</span>
              <span>${App.formatCurrency(order.total || 0)}</span>
            </div>
            <div style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;">
              <strong>Address:</strong> ${order.address || 'N/A'} | <strong>Payment:</strong> ${order.paymentMethod || 'N/A'}
            </div>
            <div style="text-align:center;margin-top:10px;font-size:0.78rem;color:var(--primary);font-weight:600;">Tap to view full details →</div>
          </div>`;
      }).join('');

      window.showOrderDetail = async function(orderId) {
        const allOrders = await DB.query('orders', o => o.userId === App.currentUser.id);
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;

        const subtotal = (order.items || []).reduce((s, i) => s + (i.price || 0) * (i.qty || 0), 0);
        const delivery = subtotal > 499 ? 0 : 49;
        const discount = order.discount || 0;
        const statusLabels = { pending: 'Order Placed', processing: 'Processing', shipped: 'Shipped', delivered: 'Delivered', cancelled: 'Cancelled' };
        const statusEmoji = { pending: '📋', processing: '⚙️', shipped: '🚚', delivered: '✅', cancelled: '❌' };

        document.getElementById('orderModalContent').innerHTML = `
          <button class="modal-close" onclick="document.getElementById('orderModal').classList.remove('active')">✕</button>

          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.2rem;margin-bottom:6px;">${statusEmoji[order.status] || '📋'}</div>
            <h3 style="margin:0;color:var(--primary-dark);">Order #${order.id.slice(-6).toUpperCase()}</h3>
            <span class="order-status ${order.status}" style="margin-top:8px;display:inline-block;">${statusLabels[order.status] || order.status}</span>
          </div>

          <div class="detail-section">
            <h4>Items</h4>
            ${(order.items || []).map(item => `
              <div class="detail-row">
                <div>
                  <span style="font-weight:600;">${item.name}</span>
                  <span style="color:var(--text-muted);font-size:0.82rem;margin-left:6px;">× ${item.qty}</span>
                </div>
                <span style="font-weight:700;">${App.formatCurrency((item.price || 0) * (item.qty || 0))}</span>
              </div>
            `).join('')}
          </div>

          <div class="detail-section">
            <h4>Price Breakdown</h4>
            <div class="detail-row">
              <span class="detail-label">Subtotal (${(order.items || []).reduce((s, i) => s + (i.qty || 0), 0)} items)</span>
              <span class="detail-value">${App.formatCurrency(subtotal)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Delivery</span>
              <span class="detail-value" style="${delivery === 0 ? 'color:var(--primary);' : ''}">${delivery === 0 ? 'FREE' : App.formatCurrency(delivery)}</span>
            </div>
            ${discount > 0 ? `
              <div class="detail-row">
                <span class="detail-label">Discount</span>
                <span class="detail-value" style="color:var(--primary);">- ${App.formatCurrency(discount)}</span>
              </div>
            ` : ''}
            <div class="detail-row" style="border-top:2px solid rgba(45,106,79,0.1);padding-top:12px;margin-top:4px;">
              <span style="font-weight:800;color:var(--primary-dark);font-size:1.05rem;">Total Paid</span>
              <span style="font-weight:800;color:var(--primary);font-size:1.05rem;">${App.formatCurrency(order.total || 0)}</span>
            </div>
          </div>

          <div class="detail-section">
            <h4>Delivery Address</h4>
            <p style="font-size:0.9rem;color:var(--text-light);line-height:1.5;">${order.address || 'N/A'}</p>
          </div>

          <div class="detail-section">
            <h4>Payment & Date</h4>
            <div class="detail-row">
              <span class="detail-label">Payment Method</span>
              <span class="detail-value">${order.paymentMethod || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Order Date</span>
              <span class="detail-value">${App.formatDate(order.orderDate || order.createdAt)}</span>
            </div>
          </div>
        `;
        document.getElementById('orderModal').classList.add('active');
      };
    });
  </script>
</body>
</html>
