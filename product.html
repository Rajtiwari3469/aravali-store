<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html" class="active">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="nav-icon-btn"><span>❤️</span><span class="badge wishlist-count" style="display:none;">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><span>🛒</span><span class="badge cart-count" style="display:none;">0</span></a>
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <a href="shop.html">Categories</a> <span>/</span> <span id="breadcrumbName">Product</span></div>
  </div>

  <div class="product-detail" id="productDetail">
    <div class="spinner"></div>
  </div>

  <section class="section">
    <div class="section-header">
      <h2>Related Products</h2>
      <a href="shop.html">View All →</a>
    </div>
    <div class="product-grid" id="relatedGrid"></div>
  </section>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none;padding-top:0;max-width:1300px;margin:0 auto;">
      <span>© 2026 Aravali Store. All rights reserved.</span>
    </div>
  </footer>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const productId = App.getParam('id');
      if (!productId) {
        window.location.href = 'shop.html';
        return;
      }

      const product = DB.getById('products', productId);
      if (!product) {
        window.location.href = 'shop.html';
        return;
      }

      document.getElementById('breadcrumbName').textContent = product.name;
      document.title = product.name + ' - Aravali Store';

      const inWishlist = App.isInWishlist(product.id);
      const cart = App.getCart();
      const cartItem = cart.find(c => c.productId === product.id);

      document.getElementById('productDetail').innerHTML = `
        <div class="detail-image">
          ${product.image ? `<img src="${product.image}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--border-radius-lg);">` : App.getProductEmojiLarge(product.category)}
        </div>
        <div class="detail-info">
          <span class="detail-category">${product.category}</span>
          ${product.badge ? `<span class="product-badge" style="position:static;display:inline-block;margin-left:8px;">${product.badge}</span>` : ''}
          <h1>${product.name}</h1>
          <div class="detail-price">${App.formatCurrency(product.price)} <span style="font-size:0.9rem;font-weight:400;color:var(--text-muted);">/ ${product.unit}</span></div>
          <p class="detail-desc">${product.description || 'Fresh and high-quality product from Aravali Store.'}</p>
          <div class="detail-stock">
            ${product.stock > 0
              ? `<span class="in-stock">✓ In Stock</span> (${product.stock} units available)`
              : `<span style="color:var(--danger);">Out of Stock</span>`}
          </div>
          <div style="display:flex;gap:12px;align-items:center;margin-top:20px;">
            ${cartItem
              ? `<div class="qty-control" style="height:42px;">
                   <button onclick="updateDetailQty(-1)" style="font-size:1.2rem;">−</button>
                   <span class="qty-val" style="font-size:1rem;" id="detailQty">${cartItem.qty}</span>
                   <button onclick="updateDetailQty(1)" style="font-size:1.2rem;">+</button>
                 </div>`
              : `<button class="btn btn-primary btn-lg" onclick="addDetailToCart()" id="detailAddBtn">🛒 Add to Cart</button>`
            }
            <button class="btn btn-secondary btn-lg" onclick="toggleDetailWishlist()" id="detailWishlistBtn">
              ${inWishlist ? '❤️ Wishlisted' : '🤍 Add to Wishlist'}
            </button>
          </div>
        </div>
      `;

      // Related products
      const related = DB.getAll('products')
        .filter(p => p.category === product.category && p.id !== product.id)
        .slice(0, 4);
      const relGrid = document.getElementById('relatedGrid');
      if (relGrid && related.length > 0) {
        relGrid.innerHTML = related.map(p => Shop.renderProductCard(p)).join('');
      }

      window.addDetailToCart = function() {
        App.addToCart(product.id);
        location.reload();
      };

      window.toggleDetailWishlist = function() {
        App.toggleWishlist(product.id);
        location.reload();
      };

      window.updateDetailQty = function(delta) {
        const cart = App.getCart();
        const item = cart.find(c => c.productId === product.id);
        if (item) {
          const newQty = item.qty + delta;
          if (newQty <= 0) {
            App.removeFromCart(product.id);
          } else {
            App.updateCartQty(product.id, newQty);
          }
          location.reload();
        }
      };
    });
  </script>
</body>
</html>
