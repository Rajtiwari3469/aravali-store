<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    body { background: #f0f4f0; }
    .bg-animation { display: none; }
    .pd-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(45,106,79,0.08);
      padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    }
    .pd-back {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(45,106,79,0.08); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .pd-back:hover { background: rgba(45,106,79,0.15); }
    .pd-topbar-title { font-weight: 700; font-size: 1rem; color: var(--primary-dark); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pd-topbar-actions { display: flex; gap: 8px; }
    .pd-topbar-actions button {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(45,106,79,0.08); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative;
    }
    .pd-topbar-actions button:hover { background: rgba(45,106,79,0.15); }
    .pd-topbar-actions .badge { position: absolute; top: -2px; right: -2px; background: var(--primary); color: white; font-size: 0.6rem; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    .pd-body { max-width: 900px; margin: 0 auto; padding: 0 0 100px; }
    .pd-image-section {
      width: 100%; height: 420px; background: white;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0 0 24px 24px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .pd-image-section img { width: 100%; height: 100%; object-fit: cover; }
    .pd-image-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(45,106,79,0.04), rgba(82,183,136,0.08));
      color: var(--text-muted); font-size: 0.9rem;
    }
    .pd-info { padding: 24px 20px; }
    .pd-info .pd-category {
      display: inline-block; padding: 4px 12px; background: rgba(82,183,136,0.12);
      color: var(--primary); border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    }
    .pd-info .pd-badge {
      display: inline-block; padding: 4px 10px; background: var(--accent);
      color: white; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      margin-left: 8px; text-transform: uppercase;
    }
    .pd-info h1 { font-size: 1.5rem; color: var(--primary-dark); margin: 12px 0 4px; line-height: 1.3; }
    .pd-info .pd-unit { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 12px; }
    .pd-info .pd-price { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
    .pd-info .pd-price small { font-size: 0.85rem; font-weight: 400; color: var(--text-muted); }
    .pd-info .pd-desc { color: var(--text-light); font-size: 0.9rem; line-height: 1.7; margin-bottom: 16px; }
    .pd-info .pd-stock { font-size: 0.85rem; margin-bottom: 16px; }
    .pd-info .pd-stock .in-stock { color: var(--success); font-weight: 600; }
    .pd-info .pd-stock .out-stock { color: var(--danger); font-weight: 600; }
    .pd-divider { height: 8px; background: rgba(45,106,79,0.04); margin: 0 -20px; }

    .pd-bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(45,106,79,0.08);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    }
    .pd-bottom-bar .pd-price-mobile { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    .pd-bottom-bar .pd-price-mobile small { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); display: block; }
    .pd-bottom-bar .qty-control { height: 40px; }
    .pd-bottom-bar .btn { flex: 1; }

    .similar-section { padding: 24px 20px 20px; }
    .similar-section h2 { font-size: 1.15rem; color: var(--primary-dark); margin-bottom: 16px; }
    .similar-scroll {
      display: flex; gap: 14px; overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; padding-bottom: 8px;
    }
    .similar-scroll::-webkit-scrollbar { display: none; }
    .similar-card {
      min-width: 160px; max-width: 160px; scroll-snap-align: start;
      background: white; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); cursor: pointer;
      transition: transform 0.2s; text-decoration: none; color: inherit;
      display: block;
    }
    .similar-card:hover { transform: translateY(-2px); }
    .similar-card-img { width: 100%; height: 130px; object-fit: cover; }
    .similar-card-img-placeholder {
      width: 100%; height: 130px; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(45,106,79,0.04), rgba(82,183,136,0.08));
      color: var(--text-muted); font-size: 0.7rem;
    }
    .similar-card-body { padding: 10px 12px; }
    .similar-card-name { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .similar-card-unit { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
    .similar-card-bottom { display: flex; align-items: center; justify-content: space-between; }
    .similar-card-price { font-size: 0.9rem; font-weight: 800; color: var(--primary); }
    .similar-card-add {
      width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid var(--primary);
      background: white; color: var(--primary); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .similar-card-add:hover { background: var(--primary); color: white; }
    .similar-card-add.in-cart { background: var(--primary); color: white; border-color: var(--primary); }

    @media (max-width: 600px) {
      .pd-image-section { height: 320px; border-radius: 0; }
      .pd-info { padding: 20px 16px; }
      .pd-info h1 { font-size: 1.3rem; }
      .pd-info .pd-price { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="pd-topbar">
    <button class="pd-back" onclick="history.back()">←</button>
    <div class="pd-topbar-title" id="pdTopTitle">Product</div>
    <div class="pd-topbar-actions">
      <button onclick="window.location.href='wishlist.html'" title="Wishlist">❤️<span class="badge wishlist-count" style="display:none;">0</span></button>
      <button onclick="window.location.href='cart.html'" title="Cart">🛒<span class="badge cart-count" style="display:none;">0</span></button>
    </div>
  </div>

  <div class="pd-body" id="pdBody">
    <div style="padding:60px;text-align:center;color:var(--text-muted);">Loading product...</div>
  </div>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      App.updateCartBadge();
      App.updateWishlistBadge();

      const productId = App.getParam('id');
      if (!productId) { window.location.href = 'shop.html'; return; }

      const product = DB.getById('products', productId);
      if (!product) { window.location.href = 'shop.html'; return; }

      document.getElementById('pdTopTitle').textContent = product.name;
      document.title = product.name + ' - Aravali Store';

      const inWishlist = App.isInWishlist(product.id);
      const cart = App.getCart();
      const cartItem = cart.find(c => c.productId === product.id);
      const qty = cartItem ? cartItem.qty : 0;

      // Similar products (same category, exclude current)
      const allProducts = DB.getAll('products');
      const similar = allProducts.filter(p => p.category === product.category && p.id !== product.id);
      // Also grab a few from other categories if not enough
      const extra = allProducts.filter(p => p.category !== product.category && p.id !== product.id).slice(0, 4);
      const similarProducts = [...similar, ...extra].slice(0, 12);

      let html = `
        <div class="pd-image-section">
          ${product.image
            ? `<img src="${product.image}" alt="${product.name}">`
            : `<div class="pd-image-placeholder">No Image Uploaded</div>`}
        </div>
        <div class="pd-info">
          <span class="pd-category">${product.category}</span>
          ${product.badge ? `<span class="pd-badge">${product.badge}</span>` : ''}
          <h1>${product.name}</h1>
          <div class="pd-unit">${product.unit}</div>
          <div class="pd-price">${App.formatCurrency(product.price)} <small>/ ${product.unit}</small></div>
          <p class="pd-desc">${product.description || 'Fresh and high-quality product from Aravali Store.'}</p>
          <div class="pd-stock">
            ${product.stock > 0
              ? `<span class="in-stock">✓ In Stock</span> — ${product.stock} units available`
              : `<span class="out-stock">✗ Out of Stock</span>`}
          </div>
        </div>
        <div class="pd-divider"></div>
      `;

      // Similar products
      if (similarProducts.length > 0) {
        html += `<div class="similar-section">
          <h2>Similar Products</h2>
          <div class="similar-scroll">`;
        similarProducts.forEach(sp => {
          const spInCart = cart.find(c => c.productId === sp.id);
          html += `
            <a href="product.html?id=${sp.id}" class="similar-card">
              <div style="overflow:hidden;">
                ${sp.image
                  ? `<img src="${sp.image}" class="similar-card-img" alt="${sp.name}">`
                  : `<div class="similar-card-img-placeholder">No Image</div>`}
              </div>
              <div class="similar-card-body">
                <div class="similar-card-name">${sp.name}</div>
                <div class="similar-card-unit">${sp.unit}</div>
                <div class="similar-card-bottom">
                  <span class="similar-card-price">${App.formatCurrency(sp.price)}</span>
                  <button class="similar-card-add ${spInCart ? 'in-cart' : ''}"
                    onclick="event.preventDefault();event.stopPropagation();addSimilarToCart('${sp.id}')">
                    ${spInCart ? '✓' : '+'}
                  </button>
                </div>
              </div>
            </a>`;
        });
        html += `</div></div>`;
      }

      document.getElementById('pdBody').innerHTML = html;

      // Bottom bar
      document.getElementById('pdBody').insertAdjacentHTML('beforeend', `
        <div class="pd-bottom-bar">
          <div class="pd-price-mobile">
            ${App.formatCurrency(product.price)}
            <small>/ ${product.unit}</small>
          </div>
          ${qty > 0
            ? `<div class="qty-control" style="height:42px;">
                <button onclick="updateQty(-1)" style="font-size:1.2rem;">−</button>
                <span class="qty-val" style="font-size:1rem;" id="pdQty">${qty}</span>
                <button onclick="updateQty(1)" style="font-size:1.2rem;">+</button>
              </div>`
            : `<button class="btn btn-primary btn-lg" onclick="addToCart()" id="pdAddBtn" style="justify-content:center;">
                🛒 Add to Cart
              </button>`
          }
        </div>
      `);

      // Functions
      window.addToCart = function() {
        App.addToCart(product.id);
        location.reload();
      };

      window.updateQty = function(delta) {
        const cart = App.getCart();
        const item = cart.find(c => c.productId === product.id);
        if (item) {
          const newQty = item.qty + delta;
          if (newQty <= 0) {
            App.removeFromCart(product.id);
          } else {
            App.updateCartQty(product.id, newQty);
          }
          location.reload();
        }
      };

      window.addSimilarToCart = function(id) {
        App.addToCart(id);
        location.reload();
      };
    });
  </script>
</body>
</html>
