<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="bestsellers.html">Bestsellers</a></li>
      <li><a href="trending.html">Trending</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <img src="assets/logo.svg" alt="Aravali Store" style="height:45px;margin:0 auto 16px;display:block;">
      <h2>Create Account</h2>
      <p class="subtitle">Join Aravali Store for fresh groceries</p>

      <div id="registerError" style="display:none;background:rgba(230,57,70,0.1);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;"></div>

      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="regPhone" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Create a password" required minlength="6">
            <button type="button" class="password-toggle" onclick="App.togglePassword('regPassword')">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
      </form>
      <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (App.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;

        const result = App.register(name, email, password, phone);
        if (result.success) {
          App.showToast('Account created successfully!', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 500);
        } else {
          const errorEl = document.getElementById('registerError');
          errorEl.textContent = result.message;
          errorEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
