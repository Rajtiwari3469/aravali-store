<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html" class="active">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="nav-icon-btn"><span>❤️</span><span class="badge wishlist-count" style="display:none;">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><span>🛒</span><span class="badge cart-count" style="display:none;">0</span></a>
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span>Categories</span></div>
    <h1>Our Products</h1>

  </div>

  <div class="search-container" style="margin-top:20px;">
    <div class="search-bar">
      <input type="text" placeholder="">
      <button class="search-btn">Search</button>
    </div>
  </div>

  <section class="section" style="padding-top:20px;">
    <div class="categories-scroll" id="shopCategories"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0 16px;">
      <div></div>
      <select id="sortSelect" style="padding:8px 14px;border:1px solid rgba(45,106,79,0.15);border-radius:8px;font-family:var(--font);font-size:0.85rem;background:rgba(255,255,255,0.6);outline:none;">
        <option value="default">Sort by: Default</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name">Name: A to Z</option>
      </select>
    </div>

    <div class="product-grid" id="shopGrid"></div>
    <div class="pagination" id="shopPagination"></div>
  </section>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none;padding-top:0;max-width:1300px;margin:0 auto;">
      <span>© 2026 Aravali Store. All rights reserved.</span>
      <span>I ❤️ INDIA</span>
    </div>
  </footer>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cat = urlParams.get('cat');
      const q = urlParams.get('q');
      if (cat) Shop.currentCategory = cat;
      if (q) {
        Shop.currentSearch = q;
        const searchInput = document.querySelector('.search-bar input');
        if (searchInput) searchInput.value = q;
      }

      const catalogs = DB.getAll('catalogs').filter(c => c.active).sort((a, b) => (a.order || 0) - (b.order || 0));
      const catContainer = document.getElementById('shopCategories');
      if (catContainer) {
        const allChip = `<button class="category-chip ${!Shop.currentCategory || Shop.currentCategory === 'All' ? 'active' : ''}" data-category="All"><span class="emoji">🏪</span> All</button>`;
        const catChips = catalogs.length > 0
          ? catalogs.map(c => `
              <button class="category-chip ${c.name === Shop.currentCategory ? 'active' : ''}" data-category="${c.name}">
                ${c.image ? `<img src="${c.image}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;">` : `<span class="emoji">${c.emoji || CATEGORY_EMOJIS[c.name] || '📦'}</span>`}
                ${c.name}
              </button>
            `).join('')
          : ['All', ...new Set(DB.getAll('products').map(p => p.category))].map(c => `
              <button class="category-chip ${c === Shop.currentCategory ? 'active' : ''}" data-category="${c}">
                <span class="emoji">${CATEGORY_EMOJIS[c] || '📦'}</span>
                ${c}
              </button>
            `).join('');
        catContainer.innerHTML = allChip + catChips;
      }

      Shop.init();
    });
  </script>
</body>
</html>
