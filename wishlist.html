<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - Aravali Store</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="assets/logo.svg" alt="Aravali Store"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="fresh-arrivals.html">Fresh Arrivals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="nav-icon-btn"><span>❤️</span><span class="badge wishlist-count" style="display:none;">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><span>🛒</span><span class="badge cart-count" style="display:none;">0</span></a>
      <div class="nav-user-section"></div>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span>Wishlist</span></div>
    <h1>Your Wishlist</h1>
  </div>

  <div class="wishlist-page">
    <div class="product-grid" id="wishlistGrid"></div>
  </div>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none;padding-top:0;max-width:1300px;margin:0 auto;">
      <span>© 2026 Aravali Store. All rights reserved.</span>
    </div>
  </footer>

  <script src="DBMS/data.js"></script>
  <script src="DBMS/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('wishlistGrid');
      const wishlist = App.getWishlist();

      if (wishlist.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-icon">❤️</div>
            <h3>Your wishlist is empty</h3>
            <p>Start adding products you love!</p>
            <a href="shop.html" class="btn btn-primary">Browse Products</a>
          </div>`;
        return;
      }

      const products = wishlist.map(id => DB.getById('products', id)).filter(Boolean);

      grid.innerHTML = products.map(p => {
        const inCart = App.getCart().find(c => c.productId === p.id);
        return `
          <div class="product-card" data-id="${p.id}">
            <button class="wishlist-btn active" onclick="removeFromWishlist('${p.id}')">❤️</button>
            <div class="product-image">${App.getProductEmoji(p.category)}</div>
            <div class="product-info">
              <div class="product-category">${p.category}</div>
              <div class="product-name">${p.name}</div>
              <div class="product-unit">${p.unit}</div>
              <div class="product-bottom">
                <div class="product-price">${App.formatCurrency(p.price)} <small>/${p.unit}</small></div>
                ${inCart
                  ? `<button class="btn-add-cart" disabled style="opacity:0.6;">In Cart</button>`
                  : `<button class="btn-add-cart" onclick="App.addToCart('${p.id}');this.textContent='In Cart';this.disabled=true;this.style.opacity=0.6;">Add +</button>`
                }
              </div>
            </div>
          </div>`;
      }).join('');

      window.removeFromWishlist = function(id) {
        App.toggleWishlist(id);
        location.reload();
      };
    });
  </script>
</body>
</html>
